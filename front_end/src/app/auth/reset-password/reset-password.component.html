<div class="login-page d-flex align-items-center justify-content-center">
  <div class="login-card p-5 shadow-lg rounded-4">

    <div class="text-center mb-4">
      <img src="assets/images/logo.png" alt="logo" class="logo">
    </div>

    <h3 class="text-center mb-2 fw-bold text-primary">Nouveau mot de passe</h3>
    <p class="text-center text-muted mb-4 small">Définissez votre nouveau code d'accès sécurisé.</p>

    <form (ngSubmit)="onResetPassword()" #rf="ngForm">

      <div class="mb-3">
        <div class="input-group-custom position-relative">
          <i class="mdi mdi-lock-outline input-icon"></i>
          <input 
            [type]="showPassword ? 'text' : 'password'"
            [(ngModel)]="newPassword"
            name="newPassword"
            class="form-control form-control-sm custom-input"
            placeholder="Nouveau mot de passe"
            required
            minlength="6"
            #pw="ngModel">
          
          <button type="button" (click)="togglePasswordVisibility()" class="btn-password-toggle">
            <i class="mdi" [ngClass]="showPassword ? 'mdi-eye-off-outline' : 'mdi-eye-outline'"></i>
          </button>
        </div>
        <div *ngIf="pw.invalid && pw.touched" class="text-danger extra-small mt-1 ps-2">
          Le mot de passe doit faire au moins 6 caractères.
        </div>
      </div>

      <div class="mb-4">
        <div class="input-group-custom position-relative">
          <i class="mdi mdi-lock-check-outline input-icon"></i>
          <input 
            [type]="showPassword ? 'text' : 'password'"
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            class="form-control form-control-sm custom-input"
            placeholder="Confirmez le mot de passe"
            required>
        </div>
        <div *ngIf="confirmPassword && newPassword !== confirmPassword" class="text-danger extra-small mt-1 ps-2">
          Les mots de passe ne correspondent pas.
        </div>
      </div>

      <div *ngIf="message" class="alert alert-success text-center py-2 mb-3 small border-0">
        {{ message }}
      </div>
      <div *ngIf="error" class="alert alert-danger text-center py-2 mb-3 small border-0">
        {{ error }}
      </div>

      <div class="d-grid">
        <button 
          type="submit"
          class="btn btn-primary-gradient btn-lg shadow-sm"
          [disabled]="loading || !rf.valid || newPassword !== confirmPassword">
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
          {{ loading ? 'Enregistrement...' : 'Réinitialiser le mot de passe' }}
        </button>
      </div>
    </form>
  </div>
</div>
