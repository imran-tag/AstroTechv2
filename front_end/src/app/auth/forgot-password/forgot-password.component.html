<div class="login-page d-flex align-items-center justify-content-center">
  <div class="login-card p-5 shadow-lg rounded-4">

    <div class="text-center mb-4">
      <img src="assets/images/logo.png" alt="logo" class="logo">
    </div>

    <h3 class="text-center mb-2 fw-bold text-primary">Récupération</h3>
    <p class="text-center text-muted mb-4 small">
      Entrez votre email pour recevoir un lien de réinitialisation.
    </p>

    <form (ngSubmit)="onResetRequest()" #f="ngForm">

      <div class="mb-4">
        <div class="input-group-custom position-relative">
          <i class="mdi mdi-email-outline input-icon"></i>
          <input 
            type="email"
            [(ngModel)]="email"
            name="email"
            class="form-control custom-input"
            placeholder="Votre adresse email"
            required
            email
            #emailInput="ngModel">
        </div>
        <div *ngIf="emailInput.invalid && emailInput.touched" class="text-danger extra-small mt-1 ps-2">
          Veuillez entrer un email valide.
        </div>
      </div>

      <div *ngIf="message" class="alert alert-success text-center py-2 mb-3 small border-0 animate__animated animate__fadeIn">
        <i class="mdi mdi-check-circle-outline me-1"></i> {{ message }}
      </div>
      
      <div *ngIf="error" class="alert alert-danger text-center py-2 mb-3 small border-0 animate__animated animate__shakeX">
        <i class="mdi mdi-alert-circle-outline me-1"></i> {{ error }}
      </div>

      <div class="d-grid mb-4">
        <button 
          type="submit"
          class="btn btn-primary-gradient btn-lg shadow-sm"
          [disabled]="loading || !f.valid">
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
          {{ loading ? 'Envoi en cours...' : 'Envoyer le lien' }}
        </button>
      </div>

      <div class="text-center">
        <a routerLink="/login" class="text-decoration-none text-muted small fw-medium hover-link">
          <i class="mdi mdi-arrow-left me-1"></i> Retour à la connexion
        </a>
      </div>
    </form>

  </div>
</div>
